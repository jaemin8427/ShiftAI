<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    :root{
      --bg:#05060d;
      --panel:rgba(7,10,22,.94);
      --ink:#cfe9ff;
      --dim:#5f7596;
      --cyan:#22f0ff;
      --magenta:#ff3ec8;
      --green:#27ff8b;
      --line:rgba(34,240,255,.22);
      --mono:'D2Coding','Consolas',ui-monospace,monospace;
    }
    *{box-sizing:border-box}
    html,body{
      margin:0;
      width:100%;
      height:100%;
      overflow:hidden;
      background:transparent;
      color:var(--ink);
      font-family:var(--mono);
      -webkit-font-smoothing:none;
    }
    body{
      display:grid;
      place-items:center;
      user-select:none;
    }
    .widget{
      position:relative;
      width:350px;
      height:260px;
      padding:16px;
      border:1px solid var(--magenta);
      border-radius:12px;
      background:
        radial-gradient(120% 80% at 100% 100%,rgba(255,62,200,.09),transparent 55%),
        rgba(7,10,22,.94);
      box-shadow:0 0 25px rgba(255,62,200,.35), inset 0 0 30px rgba(34,240,255,.03);
      overflow:hidden;
    }
    .widget::after{
      content:'';
      position:absolute;
      inset:0;
      pointer-events:none;
      background:repeating-linear-gradient(0deg,transparent 0 2px,rgba(0,0,0,.28) 3px,transparent 4px);
      opacity:.65;
      mix-blend-mode:multiply;
    }
    .head{
      position:relative;
      z-index:2;
      display:flex;
      align-items:center;
      justify-content:space-between;
      height:18px;
      font-size:12px;
      letter-spacing:.3px;
    }
    .title{
      display:flex;
      align-items:center;
      gap:8px;
      color:var(--ink);
    }
    .dot{
      width:9px;
      height:9px;
      border-radius:50%;
      background:var(--magenta);
      box-shadow:0 0 10px var(--magenta);
      animation:dotPulse 1.4s ease-in-out infinite;
    }
    body.listening .dot{
      background:var(--green);
      box-shadow:0 0 14px var(--green);
    }
    .seat{
      color:var(--dim);
      font-size:11px;
    }
    .wavebox{
      position:relative;
      z-index:2;
      height:64px;
      margin-top:22px;
      border:1px solid rgba(34,240,255,.42);
      border-radius:7px;
      background:#02040a;
      overflow:hidden;
    }
    canvas{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
    }
    .wavebox::after{
      content:'';
      position:absolute;
      inset:0;
      pointer-events:none;
      background:repeating-linear-gradient(0deg,transparent 0 3px,rgba(0,0,0,.35) 3px 4px);
      opacity:.6;
    }
    .label{
      position:relative;
      z-index:2;
      margin-top:10px;
      color:var(--dim);
      font-size:11px;
      letter-spacing:2px;
    }
    .stt{
      position:relative;
      z-index:2;
      margin-top:4px;
      color:var(--ink);
      font-size:14px;
      line-height:1.35;
      min-height:22px;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .ptt{
      position:relative;
      z-index:2;
      width:100%;
      height:44px;
      margin-top:12px;
      border:1px solid var(--magenta);
      border-radius:9px;
      color:var(--magenta);
      background:rgba(255,62,200,.08);
      display:flex;
      align-items:center;
      justify-content:center;
      gap:10px;
      font-size:13px;
      letter-spacing:1.2px;
      cursor:pointer;
      box-shadow:inset 0 0 22px rgba(255,62,200,.04);
    }
    .ptt:hover{
      background:rgba(255,62,200,.16);
    }
    body.listening .ptt{
      color:#170312;
      background:var(--magenta);
      box-shadow:0 0 26px rgba(255,62,200,.55);
    }
    .foot{
      position:absolute;
      z-index:2;
      left:16px;
      right:16px;
      bottom:14px;
      color:rgba(95,117,150,.78);
      font-size:10px;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    @keyframes dotPulse{
      0%,100%{opacity:.55;transform:scale(.92)}
      50%{opacity:1;transform:scale(1.16)}
    }
  </style>
</head>
<body>
  <section class="widget" id="dragRegion">
    <header class="head">
      <div class="title"><span class="dot"></span><span>SHIFT AI · 음성 모드</span></div>
      <div class="seat" id="seat">PC-38</div>
    </header>
    <div class="wavebox">
      <canvas id="wave"></canvas>
    </div>
    <div class="label">인식된 음성</div>
    <div class="stt" id="transcript">"대기 중"</div>
    <button class="ptt" id="ptt" type="button">⌨ 누르고 있는 동안 듣기 (SPACE)</button>
    <div class="foot">채팅 화면으로 돌아가려면 SHIFT+A+I · 닫으려면 ESC</div>
  </section>

  <script>
    const vscode = window.chrome?.webview;
    const body = document.body;
    const canvas = document.querySelector('#wave');
    const ctx = canvas.getContext('2d');
    const transcript = document.querySelector('#transcript');
    const ptt = document.querySelector('#ptt');
    const seat = document.querySelector('#seat');
    let listening = false;
    let phase = 0;

    function post(type, payload = {}) {
      vscode?.postMessage({ type, ...payload });
    }

    function setListening(value) {
      listening = value;
      body.classList.toggle('listening', listening);
      ptt.textContent = listening ? '● 듣는 중...' : '⌨ 누르고 있는 동안 듣기 (SPACE)';
    }

    window.shiftVoice = {
      setReady(engineStatus) {
        setListening(false);
        transcript.textContent = `"듣기 준비됨 · ${engineStatus}"`;
      },
      setListening() {
        setListening(true);
        transcript.textContent = '...';
      },
      setTranscript(text) {
        setListening(false);
        transcript.textContent = `"${text || ''}"`;
      },
      setSeat(value) {
        seat.textContent = value || 'PC-38';
      }
    };

    function resize() {
      const dpr = Math.min(devicePixelRatio || 1, 2);
      const rect = canvas.getBoundingClientRect();
      canvas.width = Math.max(1, Math.floor(rect.width * dpr));
      canvas.height = Math.max(1, Math.floor(rect.height * dpr));
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }
    new ResizeObserver(resize).observe(canvas);
    resize();

    function draw() {
      const w = canvas.clientWidth;
      const h = canvas.clientHeight;
      phase += listening ? 0.18 : 0.055;
      ctx.clearRect(0, 0, w, h);

      ctx.globalAlpha = 0.18;
      ctx.strokeStyle = '#22f0ff';
      ctx.lineWidth = 1;
      for (let y = 15; y < h; y += 16) {
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(w, y);
        ctx.stroke();
      }

      const amp = listening ? 17 : 4;
      const center = h / 2;
      ctx.globalAlpha = listening ? 0.95 : 0.48;
      ctx.strokeStyle = '#ff3ec8';
      ctx.lineWidth = listening ? 2.1 : 1.4;
      ctx.shadowColor = '#ff3ec8';
      ctx.shadowBlur = listening ? 11 : 5;
      ctx.beginPath();
      for (let i = 0; i <= 90; i++) {
        const x = (w * i) / 90;
        const envelope = 0.30 + 0.70 * Math.sin(Math.PI * i / 90);
        const n =
          Math.sin(phase + i * 0.23) * 0.62 +
          Math.sin(phase * 0.41 + i * 0.71) * 0.25 +
          Math.sin(phase * 1.9 + i * 0.11) * 0.13;
        const y = center + n * amp * envelope;
        i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
      }
      ctx.stroke();
      ctx.shadowBlur = 0;
      ctx.globalAlpha = 1;
      requestAnimationFrame(draw);
    }
    requestAnimationFrame(draw);

    ptt.addEventListener('pointerdown', (event) => {
      ptt.setPointerCapture(event.pointerId);
      setListening(true);
      post('ptt-start');
    });
    ptt.addEventListener('pointerup', (event) => {
      ptt.releasePointerCapture(event.pointerId);
      post('ptt-end');
    });
    ptt.addEventListener('pointercancel', () => post('ptt-end'));

    document.querySelector('#dragRegion').addEventListener('pointerdown', (event) => {
      if (event.target.closest('#ptt')) return;
      post('drag');
    });

    document.addEventListener('keydown', (event) => {
      if (event.code === 'Space') {
        event.preventDefault();
        setListening(true);
        post('ptt-start');
      }
      if (event.code === 'Escape') {
        event.preventDefault();
        post('close');
      }
    });
    document.addEventListener('keyup', (event) => {
      if (event.code === 'Space') {
        event.preventDefault();
        post('ptt-end');
      }
    });
  </script>
</body>
</html>
