<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    :root{
      --cyan:#22f0ff;
      --magenta:#ff3ec8;
      --green:#27ff8b;
      --mono:'D2Coding','Consolas',ui-monospace,monospace;
    }
    *{box-sizing:border-box}
    html,body{
      width:100%;
      height:100%;
      margin:0;
      overflow:hidden;
      background:transparent;
      font-family:var(--mono);
    }
    .face-wrap{
      position:fixed;
      inset:0;
      width:460px;
      height:500px;
      display:grid;
      place-items:center;
      pointer-events:none;
      animation:rise .9s ease-out;
    }
    @keyframes rise{
      from{transform:translateY(40px) scale(.85);opacity:0}
      to{transform:none;opacity:1}
    }
    .corecanvas{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      display:block;
      filter:drop-shadow(0 0 22px rgba(34,240,255,.28));
    }
    .crtface{
      position:absolute;
      inset:0;
      display:none;
      align-items:center;
      justify-content:center;
      pointer-events:none;
    }
    .crtface.on{display:flex}
    .crt-scale{
      transform:scale(.8);
      transform-origin:center;
      display:flex;
      flex-direction:column;
      align-items:center;
      font-family:var(--mono);
    }
    @keyframes crt_scanmove{from{transform:translateY(0)}to{transform:translateY(8px)}}
    @keyframes crt_flick{0%,96%,100%{opacity:1}97%{opacity:.82}98%{opacity:.94}}
    @keyframes crt_antpulse{0%,100%{opacity:.55;transform:scale(.9)}50%{opacity:1;transform:scale(1.18)}}
    @keyframes crt_breathe{0%,100%{transform:scale(1);opacity:.10}50%{transform:scale(1.05);opacity:.30}}
    @keyframes crt_blink{0%,55%{opacity:1}56%,100%{opacity:0}}
    @keyframes crt_dotpulse{0%,100%{box-shadow:0 0 6px 1px #27ff8b;opacity:.7}50%{box-shadow:0 0 14px 3px #27ff8b;opacity:1}}
  </style>
</head>
<body>
  <div class="face-wrap">
    <canvas id="coreCanvas" class="corecanvas" width="460" height="500"></canvas>
    <div id="crtFace" class="crtface">
      <div class="crt-scale">
        <div style="display:flex;flex-direction:column;align-items:center;margin-bottom:-2px;">
          <div style="width:14px;height:14px;border-radius:50%;background:#ff3ec8;box-shadow:0 0 14px 3px rgba(255,62,200,.8);animation:crt_antpulse 1.8s ease-in-out infinite;"></div>
          <div style="width:3px;height:26px;background:linear-gradient(#ff3ec8,rgba(255,62,200,.3));"></div>
        </div>
        <div style="position:relative;display:flex;align-items:center;justify-content:center;">
          <div style="position:absolute;width:438px;height:392px;border:1px solid rgba(34,240,255,.5);border-radius:48px;animation:crt_breathe 3.2s ease-in-out infinite;pointer-events:none;"></div>
          <div style="position:absolute;width:412px;height:366px;border:1.5px solid rgba(34,240,255,.18);border-radius:42px;pointer-events:none;"></div>
          <div style="position:relative;width:384px;height:338px;border:4px solid #22f0ff;border-radius:34px;background:#0a0e1a;box-shadow:0 0 42px rgba(34,240,255,.30),inset 0 0 32px rgba(34,240,255,.06);display:flex;align-items:center;justify-content:center;animation:crt_flick 6s infinite;">
            <div style="position:relative;width:308px;height:262px;border-radius:22px;background:#020308;border:1.5px solid rgba(34,240,255,.45);overflow:hidden;box-shadow:inset 0 0 26px rgba(0,0,0,.8);">
              <canvas id="crtCanvas" style="position:absolute;inset:0;width:100%;height:100%;z-index:1;" width="306" height="260"></canvas>
              <div style="position:absolute;inset:0;z-index:2;background:repeating-linear-gradient(0deg,transparent 0 19px,rgba(34,240,255,.06) 19px 20px);pointer-events:none;"></div>
              <div style="position:absolute;inset:0;z-index:2;background:radial-gradient(120% 60% at 50% -10%,rgba(34,240,255,.10),transparent 60%);pointer-events:none;"></div>
              <div style="position:absolute;inset:-8px;z-index:3;background:repeating-linear-gradient(0deg,transparent 0 3px,rgba(0,0,0,.35) 3px 4px);animation:crt_scanmove .6s steps(2) infinite;pointer-events:none;"></div>
              <div style="position:absolute;inset:0;z-index:4;background:radial-gradient(110% 110% at 50% 45%,transparent 55%,rgba(0,0,0,.55) 100%),linear-gradient(180deg,transparent 70%,rgba(2,3,8,.85) 100%);pointer-events:none;"></div>
              <div style="position:absolute;top:8px;left:8px;width:14px;height:14px;border-left:1.5px solid rgba(34,240,255,.6);border-top:1.5px solid rgba(34,240,255,.6);z-index:5;"></div>
              <div style="position:absolute;top:8px;right:8px;width:14px;height:14px;border-right:1.5px solid rgba(34,240,255,.6);border-top:1.5px solid rgba(34,240,255,.6);z-index:5;"></div>
              <div style="position:absolute;left:14px;bottom:12px;right:14px;z-index:6;display:flex;align-items:center;gap:8px;font-size:11px;letter-spacing:2px;color:#7e94b5;">
                <span style="width:7px;height:7px;border-radius:50%;background:#27ff8b;animation:crt_dotpulse 1.4s ease-in-out infinite;flex:none;"></span>
                <span style="color:#9fb4d6;">SHIFT//AI</span>
                <span style="opacity:.5;">.</span>
                <span style="color:#27ff8b;text-shadow:0 0 8px rgba(39,255,139,.6);">LISTENING</span>
                <span style="color:#27ff8b;animation:crt_blink 1s steps(1) infinite;">_</span>
              </div>
            </div>
          </div>
        </div>
        <svg width="208" height="80" viewBox="0 0 208 80" style="margin-top:-2px;filter:drop-shadow(0 0 8px rgba(34,240,255,.25));">
          <path d="M74 4 L134 4 L154 52 L54 52 Z" fill="#0a0e1a" stroke="#22f0ff" stroke-width="3"></path>
          <rect x="36" y="50" width="136" height="16" rx="8" fill="#0a0e1a" stroke="#22f0ff" stroke-width="3"></rect>
        </svg>
        <div style="margin-top:6px;font-size:11px;letter-spacing:3px;color:rgba(34,240,255,.55);text-shadow:0 0 10px rgba(34,240,255,.3);">음성 신호 상시 수신 · ALWAYS LISTENING</div>
      </div>
    </div>
  </div>

  <script>
    const PERSONA = {
      standard:{ color:'#27ff8b', accent:'#ff3ec8' },
      gamer:{ color:'#22f0ff', accent:'#ff3ec8' },
      focus:{ color:'#ffce4a', accent:'#22f0ff' }
    };
    const state = { persona:'standard', face:'core' };
    const $ = (s) => document.querySelector(s);
    window.shiftFace = {
      setFace(face) {
        state.face = face === 'term' || face === 'crt' ? 'term' : 'core';
        $('#coreCanvas').style.display = state.face === 'core' ? 'block' : 'none';
        $('#crtFace').classList.toggle('on', state.face === 'term');
      },
      setPersona(persona) {
        if (PERSONA[persona]) state.persona = persona;
      }
    };
    window.shiftFace.setFace('core');

    function makeCrtSpectrum(cv){
      const N=30;
      const bars=Array.from({length:N},()=>({v:0,seed:Math.random()*1000}));
      const t0=performance.now();
      function noise(t,s){
        const a=0.6*Math.sin(t*3.0+s)+0.3*Math.sin(t*6.7+s*1.7)+0.1*Math.sin(t*11.3+s*0.7);
        return Math.min(1,Math.max(0,0.5+0.5*a));
      }
      function draw(){
        const dpr=Math.min(window.devicePixelRatio||1,2);
        const w=cv.clientWidth,h=cv.clientHeight;
        if(w&&h){
          if(cv.width!==w*dpr||cv.height!==h*dpr){cv.width=w*dpr;cv.height=h*dpr;}
          const ctx=cv.getContext('2d');
          ctx.setTransform(dpr,0,0,dpr,0,0);
          ctx.clearRect(0,0,w,h);
          const t=(performance.now()-t0)/1000;
          const baseY=h*.52;
          const gap=w/(N+2);
          ctx.save();
          ctx.globalAlpha=.14;
          ctx.strokeStyle='#22f0ff';
          ctx.lineWidth=1;
          for(let y=22;y<h;y+=22){ctx.beginPath();ctx.moveTo(18,y);ctx.lineTo(w-18,y);ctx.stroke();}
          ctx.globalAlpha=1;
          for(let i=0;i<N;i++){
            const b=bars[i];
            const target=noise(t,b.seed);
            b.v=b.v*.82+target*.18;
            const amp=(10+b.v*70)*(0.55+0.45*Math.sin(t*1.5+i*.3)**2);
            const x=gap*(i+1.5);
            const grad=ctx.createLinearGradient(x,baseY-amp,x,baseY+amp);
            grad.addColorStop(0,'rgba(34,240,255,.08)');
            grad.addColorStop(.45,'rgba(34,240,255,.95)');
            grad.addColorStop(.55,'rgba(39,255,139,.95)');
            grad.addColorStop(1,'rgba(34,240,255,.08)');
            ctx.strokeStyle=grad;
            ctx.shadowColor='#22f0ff';
            ctx.shadowBlur=10;
            ctx.lineWidth=3;
            ctx.beginPath();
            ctx.moveTo(x,baseY-amp*.5);
            ctx.lineTo(x,baseY+amp*.5);
            ctx.stroke();
          }
          ctx.globalAlpha=.35;
          ctx.strokeStyle='#27ff8b';
          ctx.shadowBlur=14;
          ctx.beginPath();
          for(let x=18;x<w-18;x+=3){
            const y=baseY+Math.sin(x*.055+t*4)*8+Math.sin(x*.13-t*3)*5;
            x===18?ctx.moveTo(x,y):ctx.lineTo(x,y);
          }
          ctx.stroke();
          ctx.restore();
        }
        requestAnimationFrame(draw);
      }
      requestAnimationFrame(draw);
    }

    function rgbOf(hex){
      const h=(hex||'#27ff8b').replace('#','');
      const n=parseInt(h.length===3?h.split('').map(c=>c+c).join(''):h,16);
      return `${(n>>16)&255},${(n>>8)&255},${n&255}`;
    }

    function makeCoreFace(cvs){
      const ctx=cvs.getContext('2d');
      const DPR=Math.min(window.devicePixelRatio||1,2);
      const W=460,H=500;
      cvs.width=W*DPR; cvs.height=H*DPR; ctx.scale(DPR,DPR);
      const cx=230,cy=240, FAINT=196,RING=176,CORE=124,INNER=106, NB=23, TAU=Math.PI*2;
      const phase=[],freq=[];
      for(let i=0;i<NB;i++){phase.push(Math.random()*6.283);freq.push(3+Math.random()*7);}
      const HOME=[[0,-12],[9.92,3.6],[5.12,3.6],[5.12,12.4],[-5.12,12.4],[-5.12,3.6],[-9.92,3.6]];
      let env=0.1,base=0.12,speaking=false,nextSwitch=0,lastEnv=0,rings=[],glitchUntil=0,_raf;
      const start=performance.now();
      const rnd=(a,b)=>a+Math.random()*(b-a);
      const rrect=(x,y,w,h,r)=>{ if(ctx.roundRect){ctx.beginPath();ctx.roundRect(x,y,w,h,r);return;}
        ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath();};
      const drawHome=(x,y,s,rot,color,alpha,glow)=>{
        ctx.save();ctx.translate(x,y);ctx.rotate(rot);ctx.scale(s,s);
        ctx.beginPath();ctx.moveTo(HOME[0][0],HOME[0][1]);
        for(let i=1;i<HOME.length;i++)ctx.lineTo(HOME[i][0],HOME[i][1]);
        ctx.closePath();ctx.lineWidth=2/s;ctx.strokeStyle=color;ctx.globalAlpha=alpha;
        if(glow){ctx.shadowColor=color;ctx.shadowBlur=glow;}
        ctx.stroke();ctx.restore();ctx.shadowBlur=0;ctx.globalAlpha=1;
      };
      function colors(){
        const p=PERSONA[state.persona].color;
        return { spec:p, accent: state.persona==='focus' ? '#22f0ff' : '#ff3ec8' };
      }
      function draw(now){
        const t=(now-start)/1000, drama=1;
        const {spec,accent}=colors();
        if(t>nextSwitch){
          if(Math.random()<(speaking?0.45:0.62)){speaking=true;base=rnd(0.55,0.98)*drama;nextSwitch=t+rnd(0.7,2.1);}
          else{speaking=false;base=rnd(0.06,0.16);nextSwitch=t+rnd(0.4,1.5);}
        }
        let inst;
        if(speaking){const syl=Math.abs(Math.sin(t*9.3))*0.5+Math.abs(Math.sin(t*14.1+1))*0.3+0.2;inst=base*(0.42+0.58*syl);}
        else{inst=base+Math.sin(t*1.7)*0.02+Math.random()*0.03;}
        env+=(inst-env)*(inst>env?0.34:0.085); env=Math.max(0,Math.min(1.35,env));
        if(env-lastEnv>0.17&&env>0.45){rings.push({t0:t,c:Math.random()<0.5?'#22f0ff':accent}); if(Math.random()<0.4)glitchUntil=t+rnd(0.05,0.12);}
        lastEnv=env; const E=env;
        ctx.clearRect(0,0,W,H);
        rrect(6,6,W-12,H-12,28);
        const pg=ctx.createLinearGradient(0,0,0,H);pg.addColorStop(0,'#080c1a');pg.addColorStop(1,'#05060f');
        ctx.fillStyle=pg;ctx.fill();ctx.lineWidth=1.5;ctx.strokeStyle='#173a4e';ctx.stroke();
        ctx.save();rrect(6,6,W-12,H-12,28);ctx.clip();
        ctx.strokeStyle='rgba(34,240,255,0.045)';ctx.lineWidth=1;
        for(let gx=30;gx<W;gx+=30){ctx.beginPath();ctx.moveTo(gx,6);ctx.lineTo(gx,H-6);ctx.stroke();}
        for(let gy=30;gy<H;gy+=30){ctx.beginPath();ctx.moveTo(6,gy);ctx.lineTo(W-6,gy);ctx.stroke();}
        const sb=((t*46)%(H+80))-40;
        const sg=ctx.createLinearGradient(0,sb-28,0,sb+28);
        sg.addColorStop(0,'rgba(34,240,255,0)');sg.addColorStop(0.5,'rgba(34,240,255,0.05)');sg.addColorStop(1,'rgba(34,240,255,0)');
        ctx.fillStyle=sg;ctx.fillRect(6,sb-28,W-12,56);
        const sweep=(t*0.62)%TAU;
        ctx.save();ctx.beginPath();ctx.moveTo(cx,cy);ctx.arc(cx,cy,RING-4,sweep-0.62,sweep);ctx.closePath();
        const wg=ctx.createRadialGradient(cx,cy,40,cx,cy,RING);
        wg.addColorStop(0,'rgba(34,240,255,0.02)');wg.addColorStop(1,'rgba(34,240,255,0.10)');
        ctx.fillStyle=wg;ctx.fill();ctx.restore();
        ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(cx+Math.cos(sweep)*(RING-4),cy+Math.sin(sweep)*(RING-4));
        ctx.strokeStyle='rgba(34,240,255,0.32)';ctx.lineWidth=1.5;ctx.shadowColor='#22f0ff';ctx.shadowBlur=10;ctx.stroke();ctx.shadowBlur=0;
        ctx.save();ctx.setLineDash([2,9]);ctx.lineDashOffset=-t*18;
        ctx.beginPath();ctx.arc(cx,cy,FAINT,0,TAU);ctx.strokeStyle='rgba(34,240,255,0.14)';ctx.lineWidth=1;ctx.stroke();ctx.restore();
        const NT=72;
        for(let k=0;k<NT;k++){
          const a=(k/NT)*TAU-Math.PI/2, major=k%6===0, len=major?13:6;
          let d=Math.abs(((a-sweep+Math.PI)%TAU)-Math.PI); const near=Math.max(0,1-d/0.55);
          const op=(major?0.4:0.16)+near*0.55;
          const x1=cx+Math.cos(a)*RING,y1=cy+Math.sin(a)*RING,x2=cx+Math.cos(a)*(RING+len),y2=cy+Math.sin(a)*(RING+len);
          ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);
          ctx.strokeStyle=`rgba(34,240,255,${Math.min(1,op)})`;ctx.lineWidth=major?2:1;ctx.stroke();
        }
        ctx.beginPath();ctx.arc(cx,cy,RING,0,TAU);ctx.strokeStyle='rgba(34,240,255,0.85)';ctx.lineWidth=2;
        ctx.shadowColor='#22f0ff';ctx.shadowBlur=6+E*14;ctx.stroke();ctx.shadowBlur=0;
        const seg=(t*1.1)%TAU;
        ctx.beginPath();ctx.arc(cx,cy,RING,seg,seg+0.5);ctx.strokeStyle='#bdf6ff';ctx.lineWidth=2.5;
        ctx.shadowColor='#22f0ff';ctx.shadowBlur=16;ctx.stroke();ctx.shadowBlur=0;
        const pa=-t*0.85;
        ctx.beginPath();ctx.arc(cx,cy,RING,pa,pa+1.5);ctx.strokeStyle=accent;ctx.lineWidth=3;ctx.lineCap='round';
        ctx.shadowColor=accent;ctx.shadowBlur=12+E*10;ctx.stroke();
        const hx=cx+Math.cos(pa+1.5)*RING,hy=cy+Math.sin(pa+1.5)*RING;
        ctx.beginPath();ctx.arc(hx,hy,4+E*2,0,TAU);ctx.fillStyle=accent;ctx.shadowBlur=18;ctx.fill();
        ctx.shadowBlur=0;ctx.lineCap='butt';
        const cardAlpha=0.45+E*0.45, cr=RING+16;
        drawHome(cx,cy-cr,0.95,0,'#22f0ff',cardAlpha,6+E*8);
        drawHome(cx+cr,cy,0.95,Math.PI/2,'#22f0ff',cardAlpha,6+E*8);
        drawHome(cx,cy+cr,0.95,Math.PI,'#22f0ff',cardAlpha,6+E*8);
        drawHome(cx-cr,cy,0.95,-Math.PI/2,'#22f0ff',cardAlpha,6+E*8);
        rings=rings.filter(r=>t-r.t0<1.5);
        for(const r of rings){const age=t-r.t0,R=CORE*0.5+age*165,al=Math.max(0,0.55*(1-age/1.5));
          ctx.beginPath();ctx.arc(cx,cy,R,0,TAU);ctx.strokeStyle=r.c;ctx.globalAlpha=al;ctx.lineWidth=2*(1-age/1.5);ctx.stroke();ctx.globalAlpha=1;}
        const bloom=ctx.createRadialGradient(cx,cy,10,cx,cy,CORE+30);
        bloom.addColorStop(0,`rgba(34,240,255,${0.05+E*0.22})`);bloom.addColorStop(1,'rgba(34,240,255,0)');
        ctx.fillStyle=bloom;ctx.beginPath();ctx.arc(cx,cy,CORE+30,0,TAU);ctx.fill();
        const cg=ctx.createRadialGradient(cx,cy-14,12,cx,cy,CORE);
        cg.addColorStop(0,'#0e2a3a');cg.addColorStop(1,'#05060d');
        ctx.beginPath();ctx.arc(cx,cy,CORE,0,TAU);ctx.fillStyle=cg;ctx.fill();
        ctx.lineWidth=3+E*3;ctx.strokeStyle='#22f0ff';ctx.shadowColor='#22f0ff';ctx.shadowBlur=8+E*26;ctx.stroke();ctx.shadowBlur=0;
        ctx.beginPath();ctx.arc(cx,cy,INNER,0,TAU);ctx.strokeStyle='rgba(34,240,255,0.28)';ctx.lineWidth=1;ctx.stroke();
        drawHome(cx,cy-4,2.7,0,'#22f0ff',0.10+E*0.06,0);
        ctx.save();ctx.beginPath();ctx.arc(cx,cy,INNER-4,0,TAU);ctx.clip();
        ctx.beginPath();ctx.moveTo(cx-96,cy);ctx.lineTo(cx+96,cy);
        ctx.strokeStyle=`rgba(${rgbOf(spec)},0.22)`;ctx.lineWidth=1;ctx.stroke();
        const span=184,maxLen=82;
        for(let i=0;i<NB;i++){
          const p=i/(NB-1), x=cx-span/2+p*span;
          const bell=Math.exp(-((p-0.5)*(p-0.5))/(2*0.19*0.19));
          const wave=0.5+0.5*Math.sin(t*freq[i]+phase[i]), jit=Math.random()*0.07;
          let hf=E*(0.32+0.9*bell)*(0.32+0.68*wave)+jit*(0.3+bell); hf=Math.max(0.02,Math.min(1,hf));
          const len=hf*maxLen;
          ctx.beginPath();ctx.moveTo(x,cy-len);ctx.lineTo(x,cy+len);ctx.lineCap='round';ctx.lineWidth=4.4;
          ctx.strokeStyle=spec;ctx.globalAlpha=0.5+hf*0.5;ctx.shadowColor=spec;ctx.shadowBlur=3+E*14*hf;ctx.stroke();
          ctx.globalAlpha=Math.min(1,0.4+hf);
          ctx.beginPath();ctx.arc(x,cy-len,1.6+hf*1.6,0,TAU);ctx.fillStyle='#d8ffe9';ctx.fill();
          ctx.beginPath();ctx.arc(x,cy+len,1.6+hf*1.6,0,TAU);ctx.fill();
          ctx.globalAlpha=1;ctx.shadowBlur=0;
        }
        ctx.lineCap='butt';ctx.restore();
        ctx.shadowBlur=0;ctx.font='10px "JetBrains Mono", monospace';ctx.textAlign='left';
        const recOn=(Math.floor(t*1.4)%2===0);
        ctx.fillStyle=recOn?'#ff4d6d':'rgba(255,77,109,0.25)';ctx.beginPath();ctx.arc(36,34,3.4,0,TAU);ctx.fill();
        ctx.fillStyle='rgba(34,240,255,0.8)';ctx.fillText('REC',45,38);
        ctx.fillStyle='rgba(95,117,150,0.85)';ctx.fillText('INPUT · MIC_01',28,54);
        ctx.textAlign='right';const db=Math.min(0,-58+E*60);
        ctx.fillStyle='rgba(39,255,139,0.9)';ctx.fillText('LV '+db.toFixed(1)+' dB',W-28,38);
        ctx.fillStyle='rgba(95,117,150,0.85)';ctx.fillText('AGENT · ONLINE',W-28,54);
        ctx.textAlign='center';ctx.fillStyle='rgba(39,255,139,0.32)';ctx.font='8px "JetBrains Mono", monospace';
        ['63','160','400','1k','2.5k','6k','16k'].forEach((l,i)=>{const x=cx-90+(i/6)*180;ctx.fillText(l,x,cy+96);});
        ctx.font='9px "JetBrains Mono", monospace';ctx.fillStyle='rgba(95,117,150,0.75)';
        ctx.fillText('SHIFT // AI  ·  v2.6  ·  LISTENING_CORE',cx,H-22);
        ctx.strokeStyle='rgba(34,240,255,0.5)';ctx.lineWidth=1.5;const bL=16,m=20;
        const corner=(x,y,dx,dy)=>{ctx.beginPath();ctx.moveTo(x,y+dy*bL);ctx.lineTo(x,y);ctx.lineTo(x+dx*bL,y);ctx.stroke();};
        corner(m,m,1,1);corner(W-m,m,-1,1);corner(m,H-m,1,-1);corner(W-m,H-m,-1,-1);
        if(t<glitchUntil){for(let g=0;g<2;g++){const gy=cy+rnd(-CORE,CORE),gh=rnd(2,6),off=rnd(-6,6);
          ctx.fillStyle=g===0?'rgba(255,62,200,0.5)':'rgba(34,240,255,0.5)';ctx.fillRect(cx-CORE+off,gy,CORE*2,gh);}}
        const vg=ctx.createRadialGradient(cx,cy,CORE,cx,cy,290);
